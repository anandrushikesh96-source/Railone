<!DOCTYPE html>
<html>

<head>
    <title>Railone1stPage</title>
    <style>
        body {
            margin: 0;
            font-family: arial;
        }
        /*Screen */
        
        screen {
            display: none;
            padding: 20px;
        }
        
        .active {
            display: block;
        }
        /* BUtton style*/
        
        .btn {
            padding: 10px 20px;
            background: #4a6cf7;
            color: white;
            border: none;
            border-radius: 6px;
            margin-top: 20px;
        }
    </style>
</head>

<body>
    SCREEN 1
    <div id="page" class="screen active">
        <h2> Railone Home</h2>
        <img src="img1.jpeg" width="100%">



        <button class="btn" onclick="nextpage()">
                next
            </button>
    </div>

    <!--SCREEN2-->
    <div id="page" class="screen">
        <h2>Upcoming Journey</h2>
        <img src="img2.jpeg" width="100%">

        <!--View Details Link-->
        <a href="RailOne.html">
            <button class="btn">View Details</button>
        </a>
    </div>

    <script>
        function nextpage() {

            document.getElementByid("page1").classList.remove("active");

            document.getElementByid("page2").classList.add("active");
        }
    </script>

</body>

</html>
